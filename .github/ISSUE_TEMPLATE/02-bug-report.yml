name: Bug Report
description: Report something that is broken or not working as expected
title: "[bug]: "
labels: ["kind/bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Fill out the details below so it can be diagnosed and fixed.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is broken? What did you expect to happen?
      placeholder: Clear and concise description of the issue
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can someone reproduce this?
      placeholder: |
        1. Run '...'
        2. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Output / Logs
      description: Paste any logs, error messages, or command output. This will be auto-formatted.
      render: shell
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: false
      options:
        - TalosOS / Nodes
        - Kubernetes / Cluster
        - Pulumi / IaC
        - Networking
        - Storage
        - Security / Auth
        - Monitoring / Observability
        - CI/CD (Flux/ArgoCD)
        - Other
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - critical (service down / data loss)
        - high (degraded, workaround exists)
        - medium (minor issue)
        - low (cosmetic / nice-to-fix)
    validations:
      required: true

  - type: input
    id: affected-service
    attributes:
      label: Affected Service / Resource
      description: Which service, node, or Pulumi resource is affected?
      placeholder: e.g. metallb, node-01, home-assistant
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I checked for existing issues before filing this
          required: true
        - label: I included relevant logs or output
          required: false
